name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/**
      - fix/**

jobs:
  checks:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.12.1 --activate

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Commitlint
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.sha }}"

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test:unit

      - name: E2E smoke
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

      - name: Package macOS
        run: pnpm package:mac
